<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nazariyen — AI Learning Platform</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface": "#f8f9ff",
              "secondary-fixed-dim": "#4edea3",
              "tertiary-fixed": "#ffddb8",
              "secondary-container": "#6cf8bb",
              "on-surface": "#0b1c30",
              "surface-dim": "#cbdbf5",
              "surface-container": "#e5eeff",
              "on-tertiary-fixed": "#2a1700",
              "on-surface-variant": "#434655",
              "on-secondary": "#ffffff",
              "on-error": "#ffffff",
              "tertiary-fixed-dim": "#ffb95f",
              "on-primary-container": "#eeefff",
              "on-secondary-container": "#00714d",
              "background": "#f8f9ff",
              "primary-fixed-dim": "#b4c5ff",
              "on-secondary-fixed-variant": "#005236",
              "surface-container-lowest": "#ffffff",
              "primary": "#004ac6",
              "inverse-on-surface": "#eaf1ff",
              "on-primary-fixed-variant": "#003ea8",
              "on-primary": "#ffffff",
              "on-background": "#0b1c30",
              "on-error-container": "#93000a",
              "surface-bright": "#f8f9ff",
              "surface-container-low": "#eff4ff",
              "inverse-primary": "#b4c5ff",
              "primary-container": "#2563eb",
              "outline-variant": "#c3c6d7",
              "on-tertiary-fixed-variant": "#653e00",
              "inverse-surface": "#213145",
              "on-tertiary-container": "#ffeedd",
              "on-primary-fixed": "#00174b",
              "tertiary-container": "#996100",
              "surface-container-high": "#dce9ff",
              "error": "#ba1a1a",
              "outline": "#737686",
              "on-secondary-fixed": "#002113",
              "secondary": "#006c49",
              "surface-container-highest": "#d3e4fe",
              "primary-fixed": "#dbe1ff",
              "tertiary": "#784b00",
              "surface-variant": "#d3e4fe",
              "error-container": "#ffdad6",
              "on-tertiary": "#ffffff",
              "surface-tint": "#0053db",
              "secondary-fixed": "#6ffbbe"
            },
            borderRadius: {
              "DEFAULT": "0.25rem",
              "lg": "0.5rem",
              "xl": "0.75rem",
              "2xl": "1rem",
              "3xl": "1.5rem",
              "full": "9999px"
            },
            spacing: {
              "base": "8px",
              "margin-mobile": "16px",
              "margin-desktop": "40px",
              "margin-page": "2.5rem",
              "container-max": "1200px",
              "gutter": "24px",
              "section-gap": "4rem"
            },
            fontFamily: {
              "sans": ["Plus Jakarta Sans", "ui-sans-serif", "system-ui"],
              "label-md": ["Plus Jakarta Sans"],
              "label-sm": ["Plus Jakarta Sans"],
              "headline-lg-mobile": ["Plus Jakarta Sans"],
              "headline-lg": ["Plus Jakarta Sans"],
              "body-lg": ["Plus Jakarta Sans"],
              "body-md": ["Plus Jakarta Sans"],
              "headline-md": ["Plus Jakarta Sans"],
              "headline-xl": ["Plus Jakarta Sans"],
              "display": ["Plus Jakarta Sans"],
              "metadata": ["Plus Jakarta Sans"]
            },
            fontSize: {
              "label-md": ["14px", { "lineHeight": "1.4", "letterSpacing": "0.01em", "fontWeight": "600" }],
              "label-sm": ["12px", { "lineHeight": "1", "fontWeight": "700" }],
              "headline-lg-mobile": ["28px", { "lineHeight": "1.2", "fontWeight": "700" }],
              "headline-lg": ["32px", { "lineHeight": "1.2", "fontWeight": "700" }],
              "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
              "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
              "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "700" }],
              "headline-xl": ["40px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "800" }],
              "display": ["44px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
              "metadata": ["12px", { "lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "500" }]
            }
          }
        }
      };
    </script>
    <style>
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: #f8f9ff;
        color: #0b1c30;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .btn-3d {
        transition: transform 0.1s, box-shadow 0.1s;
        box-shadow: 0 4px 0 0 #003ea8;
      }
      .btn-3d:active {
        transform: translateY(2px);
        box-shadow: 0 2px 0 0 #003ea8;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
      .bg-pattern-dots {
        background-image: radial-gradient(#d3e4fe 1px, transparent 1px);
        background-size: 24px 24px;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      .animate-float { animation: float 4s ease-in-out infinite; }
      @keyframes wave {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(20deg); }
        75% { transform: rotate(-10deg); }
      }
      .wave-animation {
        display: inline-block;
        transform-origin: bottom right;
        animation: wave 2s ease-in-out infinite;
      }
      .chat-container::-webkit-scrollbar,
      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .chat-container::-webkit-scrollbar-thumb,
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
